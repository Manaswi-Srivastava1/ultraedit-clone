        .btnn {

            background-color: rgb(224, 189, 34);
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 5px;

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;

            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        .box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 20px;

            padding: 10px;
            font-size: 20px;

            width: 100%;
            min-height: 200px;
            box-sizing: border-box;

            background-color: rgb(255, 242, 242);
            border-radius: 8px;
        }
